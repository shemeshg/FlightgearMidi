<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>FlightGear Live Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Reliable RotatedMarker plugin -->
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>

<script>
    // Initial center (Geneva Airport)
    const initialPos = [46.2381, 6.1089];

    // Create map
    const map = L.map('map').setView(initialPos, 15);

    // ESRI Satellite layer
    L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
            attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
            maxZoom: 19
        }
    ).addTo(map);

    // Plane icon
    const planeIcon = L.icon({
        iconUrl: 'plane.png',
        iconSize: [50, 50],
        iconAnchor: [25, 25]
    });

    // Rotatable plane marker
    const planeMarker = L.marker(initialPos, {
        icon: planeIcon,
        rotationAngle: 0,
        rotationOrigin: 'center center'
    }).addTo(map);

    // Fetch FG position + heading
    async function updatePlane() {
        try {
            const latRes = await fetch('http://localhost:8800/json/position/latitude-deg');
            const lonRes = await fetch('http://localhost:8800/json/position/longitude-deg');
            const hdgRes = await fetch('http://localhost:8800/json/orientation/heading-deg');

            const latJson = await latRes.json();
            const lonJson = await lonRes.json();
            const hdgJson = await hdgRes.json();

            const lat = latJson.value;
            const lon = lonJson.value;
            const hdg = hdgJson.value;

            // Update marker position
            planeMarker.setLatLng([lat, lon]);

            // Update rotation (heading)
            planeMarker.setRotationAngle(hdg -90);

        } catch (err) {
            console.log("FlightGear not available");
        }
    }

    // Update every second
    setInterval(updatePlane, 1000);
</script>

</body>
</html>
