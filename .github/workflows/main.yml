name: Build Wheels

on:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: AMD64
            env:
              CIBW_ENVIRONMENT: >
                CMAKE_ARGS="-DLIBREMIDI_NO_WINRT=ON -DLIBREMIDI_NO_KDMAPI=ON -DCMAKE_CXX_STANDARD=20"

          - os: windows-latest
            arch: ARM64
            env:
              CIBW_ENVIRONMENT: >
                CMAKE_ARGS="-DLIBREMIDI_NO_WINRT=ON -DLIBREMIDI_NO_KDMAPI=ON -DCMAKE_CXX_STANDARD=20"

          # Linux
          - os: ubuntu-latest
            arch: x86_64
            env:
              CIBW_ENVIRONMENT: >
                CMAKE_ARGS="-DCMAKE_CXX_STANDARD=20"

          - os: ubuntu-latest
            arch: aarch64
            env:
              CIBW_ENVIRONMENT: >
                CMAKE_ARGS="-DCMAKE_CXX_STANDARD=20"

          # macOS (universal2 covers both Intel + ARM)
          - os: macos-latest
            arch: universal2
            env:
              CIBW_ENVIRONMENT: >
                CMAKE_ARGS="-DCMAKE_CXX_STANDARD=20"

    env:
      CIBW_BUILD: "cp3*-*"
      CIBW_ARCHS: ${{ matrix.arch }}
      CIBW_SKIP: "pp* *-musllinux*"
      CIBW_TEST_SKIP: "*"
      CMAKE_GENERATOR: "Unix Makefiles"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # QEMU required for Linux ARM builds
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
